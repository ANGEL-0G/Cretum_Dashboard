<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Cretum Partners · Portal</title>
<style>
  :root{--navy:#17436b;--navy-mid:#2a4f8f;--ink:#1a1f2e;--soft:#6b7689;--line:#e4e9f0;--red:#c0392b;--red-bg:#fbe6e3;
        --gray-200:#e0e3eb;--gray-300:#c2c8d2;--gray-400:#9aa3b5;--font:-apple-system,'Segoe UI',Arial,sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);color:var(--ink)}

  /* ───────── LOGIN ───────── */
  #loginView{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:#fbfdff;position:relative;overflow:hidden;
  }
  /* textura de puntos azules muy sutil, difuminada hacia los bordes */
  #loginView::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(60,120,220,.10) 1px, transparent 1px);
    background-size:30px 30px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  /* orbes azules desenfocados flotando suave (estética tipo Antigravity) */
  .blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
  .blob1{width:460px;height:460px;top:-120px;left:-110px;background:radial-gradient(circle,rgba(74,140,255,.30),transparent 70%);animation:float1 16s ease-in-out infinite}
  .blob2{width:380px;height:380px;bottom:-120px;right:-90px;background:radial-gradient(circle,rgba(120,170,255,.28),transparent 70%);animation:float2 19s ease-in-out infinite}
  .blob3{width:320px;height:320px;top:54%;left:46%;background:radial-gradient(circle,rgba(150,135,255,.22),transparent 70%);animation:float3 14s ease-in-out infinite}
  /* puntos azules más chicos */
  .dot{position:absolute;border-radius:50%;filter:blur(20px);pointer-events:none}
  .dot1{width:100px;height:100px;top:16%;right:16%;background:radial-gradient(circle,rgba(70,130,245,.34),transparent 70%);animation:float2 13s ease-in-out infinite}
  .dot2{width:64px;height:64px;bottom:20%;left:14%;background:radial-gradient(circle,rgba(90,150,250,.32),transparent 70%);animation:float1 11s ease-in-out infinite}
  .dot3{width:130px;height:130px;top:28%;left:7%;background:radial-gradient(circle,rgba(120,160,255,.24),transparent 70%);animation:float3 18s ease-in-out infinite}
  .dot4{width:80px;height:80px;bottom:12%;right:24%;background:radial-gradient(circle,rgba(80,140,250,.30),transparent 70%);animation:float1 15s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,46px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-54px,-36px)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,28px) scale(1.18)}}

  .card{
    position:relative;z-index:2;width:380px;max-width:100%;
    background:rgba(255,255,255,.78);
    -webkit-backdrop-filter:blur(16px) saturate(160%);backdrop-filter:blur(16px) saturate(160%);
    border-radius:20px;padding:38px 36px 28px;
    box-shadow:0 24px 60px rgba(30,64,130,.14),0 6px 18px rgba(30,64,130,.08),0 0 0 1px rgba(20,50,100,.05);
    animation:slideUp .5s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;top:0;left:30px;right:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(26,58,107,.4),transparent)}
  .logo{width:200px;max-width:100%;display:block;margin:2px auto 8px;filter:drop-shadow(0 4px 12px rgba(26,58,107,.14));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
  .card:hover .logo{transform:scale(1.04)}
  .sub{font-size:12.5px;color:var(--gray-400);text-align:center;letter-spacing:1.5px;margin-bottom:26px;text-transform:uppercase}
  .field{position:relative;margin-bottom:12px}
  .fi{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;font-family:var(--font)}
  .fi:hover{border-color:var(--gray-300)}
  .fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,58,107,.1)}
  .fi::placeholder{color:var(--gray-300)}
  .btn{
    position:relative;overflow:hidden;width:100%;padding:13px 16px;margin-top:8px;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border:none;border-radius:10px;color:#fff;
    font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 8px 20px rgba(26,58,107,.4),inset 0 1px 0 rgba(255,255,255,.18);
    transition:all .22s cubic-bezier(.4,0,.2,1);
  }
  .btn::before{content:'';position:absolute;top:0;left:-120%;width:80%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32) 50%,transparent);transform:skewX(-25deg);transition:left .7s cubic-bezier(.4,0,.2,1)}
  .btn:hover::before{left:120%}
  .btn>span,.btn>i{position:relative;z-index:1}
  .btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(26,58,107,.5),inset 0 1px 0 rgba(255,255,255,.22)}
  .btn:active{transform:translateY(0) scale(.98)}
  .btn:disabled{opacity:.65;cursor:default}
  .msg{font-size:12px;color:var(--red);background:var(--red-bg);border-radius:10px;padding:10px 13px;margin-top:14px;display:none;align-items:center;gap:7px}
  .msg.show{display:flex}
  .foot{text-align:center;font-size:10.5px;color:var(--gray-300);margin-top:22px;letter-spacing:.3px}

  /* ───────── DASHBOARD ───────── */
  #app{display:none;height:100%}
  #frame{width:100%;height:100%;border:0;background:#fff;display:block}
  /* Botón flotante "← Menú" (glass): translúcido + desenfoque, deja ver el contenido detrás */
  .pt-fab{position:fixed;top:calc(14px + env(safe-area-inset-top,0px));left:14px;z-index:12}
  .pt-fab-btn{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    padding:9px 15px;border-radius:999px;
    background:rgba(255,255,255,.5);color:var(--navy);
    border:1px solid rgba(255,255,255,.55);
    font-family:var(--font);font-size:13.5px;font-weight:600;line-height:1;
    -webkit-backdrop-filter:blur(16px) saturate(180%);backdrop-filter:blur(16px) saturate(180%);
    box-shadow:0 4px 18px rgba(20,40,80,.18);
    transition:background .18s,color .18s,transform .12s,box-shadow .18s,border-color .18s;
  }
  .pt-fab-btn:hover{background:rgba(255,255,255,.66)}
  .pt-fab-btn:active{transform:scale(.97);background:var(--navy);color:#fff;border-color:var(--navy)}
  .pt-fab-btn span{pointer-events:none}
  .pt-fab-ic{font-size:15px;line-height:1}
  @media (prefers-reduced-motion:reduce){.pt-fab-btn{transition:none}}

  /* Menú de dashboards: respaldo cuando hay varios y no se entró por enlace directo */
  .menu-view{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:24px;background:#fbfdff;overflow:auto;animation:pvMenuIn .26s ease-out}
  .menu-card{width:460px;max-width:100%;text-align:center;animation:pvCardIn .34s cubic-bezier(.23,1,.32,1)}
  .menu-logo{width:180px;max-width:70%;display:block;margin:0 auto 22px;filter:drop-shadow(0 4px 12px rgba(26,58,107,.14))}
  .menu-title{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:20px}
  .menu-list{display:flex;flex-direction:column;gap:10px}
  .menu-item{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:rgba(255,255,255,.92);border:1.5px solid var(--line);border-radius:12px;
    padding:15px 17px;font-size:15px;font-weight:500;color:var(--ink);font-family:var(--font);cursor:pointer;
    box-shadow:0 2px 8px rgba(30,64,130,.05);
    transition:border-color .2s cubic-bezier(.2,.6,.3,1),transform .2s cubic-bezier(.2,.6,.3,1),box-shadow .2s;
    animation:pvItemIn .34s cubic-bezier(.23,1,.32,1) backwards;
  }
  .menu-item:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 10px 26px rgba(30,64,130,.12)}
  .menu-item .mi-ico{width:38px;height:38px;flex:0 0 38px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;font-size:15px}
  .menu-item .mi-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .menu-item .mi-arrow{color:var(--gray-300);font-size:19px;transition:transform .2s cubic-bezier(.2,.6,.3,1),color .2s}
  .menu-item:hover .mi-arrow{color:var(--navy);transform:translateX(3px)}
  .menu-logout{margin-top:18px;background:none;border:0;color:var(--soft);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;padding:9px 14px;border-radius:9px;transition:color .15s,background .15s}
  .menu-logout:hover{color:var(--red);background:rgba(0,0,0,.04)}
  .menu-empty{font-size:13px;color:var(--soft);padding:6px 0 2px}
  /* Transiciones de navegación (menú ↔ dashboard) */
  .menu-view.closing{animation:pvMenuOut .19s ease-out forwards}
  .menu-item:nth-child(1){animation-delay:.03s}
  .menu-item:nth-child(2){animation-delay:.08s}
  .menu-item:nth-child(3){animation-delay:.13s}
  .menu-item:nth-child(4){animation-delay:.18s}
  .menu-item:nth-child(5){animation-delay:.23s}
  .menu-item:nth-child(n+6){animation-delay:.27s}
  @keyframes pvMenuIn{from{opacity:0}to{opacity:1}}
  @keyframes pvMenuOut{from{opacity:1}to{opacity:0}}
  @keyframes pvCardIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes pvItemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .menu-item,.menu-item .mi-arrow{transition:none}
    .menu-view,.menu-card,.menu-item,.menu-view.closing{animation:none}
  }
</style>
</head>
<body>
  <!-- Login -->
  <div id="loginView">
    <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
    <div class="dot dot1"></div><div class="dot dot2"></div><div class="dot dot3"></div><div class="dot dot4"></div>
    <div class="card">
      <img src="/logo.png" alt="Cretum Partners" class="logo">
      <div class="sub">Portal de Inversión</div>
      <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="field">
          <input id="u" class="fi" placeholder="Usuario" autocomplete="username" autocapitalize="none" autocorrect="off" required></div>
        <div class="field">
          <input id="p" class="fi" type="password" placeholder="Contraseña" autocomplete="current-password" required></div>
        <button id="btn" class="btn" type="submit"><span>Entrar</span></button>
        <div class="msg" id="msg"></div>
      </form>
      <div class="foot">© Cretum Partners</div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="pt-fab" id="ptFab" style="display:none">
      <button class="pt-fab-btn" id="ptFabBtn" onclick="showMenu()" aria-label="Volver al menú" title="Volver al menú">
        <span class="pt-fab-ic" aria-hidden="true">←</span>
        <span class="pt-fab-lbl">Menú</span>
      </button>
    </div>
    <!-- Menú de respaldo: solo si el cliente tiene varios dashboards y entra sin enlace directo -->
    <div id="menuView" class="menu-view" style="display:none">
      <div class="menu-card">
        <img src="/logo.png" alt="Cretum Partners" class="menu-logo">
        <div class="menu-title">Tus dashboards</div>
        <div class="menu-list" id="menuList"></div>
        <button class="menu-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
    <iframe id="frame" sandbox="allow-scripts allow-popups allow-forms"></iframe>
  </div>

<script>
  let token = '';
  let dashboards = [];
  let currentSlug = '';   // dashboard abierto; NO escribimos #slug en la URL al navegar

  // Disuasivo de descarga: sin menú contextual (Guardar como / Guardar imagen).
  document.addEventListener('contextmenu', e => e.preventDefault());

  async function api(body) {
    const r = await fetch('/api/portal', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    return d;
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn'), msg = document.getElementById('msg');
    msg.className = 'msg'; btn.disabled = true; btn.querySelector('span').textContent = 'Entrando…';
    try {
      const d = await api({ action:'login', username:document.getElementById('u').value, password:document.getElementById('p').value });
      token = d.token;
      enterApp(d.dashboards);
    } catch (err) {
      msg.innerHTML = '⚠ ' + err.message; msg.className = 'msg show';
    } finally {
      btn.disabled = false; btn.querySelector('span').textContent = 'Entrar';
    }
    return false;
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function enterApp(dl) {
    dashboards = dl || [];
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    // Enlace directo: /portal#slug abre esa campaña sin pasar por el menú
    const slug = decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
    const target = slug && dashboards.find(d => d.slug === slug);
    if (target) return openDash(target.slug);
    if (dashboards.length === 1) return openDash(dashboards[0].slug);
    if (!dashboards.length) return showEmpty();
    showMenu();                                  // varios y sin enlace directo → menú
  }

  function showEmpty() {
    document.getElementById('menuList').innerHTML = '<div class="menu-empty">No tienes dashboards asignados todavía.</div>';
    document.getElementById('menuView').style.display = 'flex';
    document.getElementById('ptFab').style.display = 'none';
    const frame = document.getElementById('frame');
    frame.removeAttribute('src'); frame.srcdoc = '';
  }

  function showMenu() {
    const list = document.getElementById('menuList');
    list.innerHTML = dashboards.map(d =>
      `<button class="menu-item" data-slug="${esc(d.slug)}">
         <span class="mi-ico" aria-hidden="true">▦</span>
         <span class="mi-nm">${esc(d.title)}</span>
         <span class="mi-arrow" aria-hidden="true">›</span>
       </button>`).join('');
    list.querySelectorAll('.menu-item').forEach(b => b.onclick = () => openDash(b.dataset.slug));
    document.getElementById('menuView').style.display = 'flex';
    document.getElementById('ptFab').style.display = 'none';   // en el menú no hace falta el botón "← Menú"
  }

  // Oculta el menú con un fade suave, revelando el dashboard detrás.
  function hideMenuView() {
    const mv = document.getElementById('menuView');
    if (mv.style.display === 'none') return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) { mv.style.display = 'none'; return; }
    mv.classList.add('closing');
    setTimeout(() => { mv.style.display = 'none'; mv.classList.remove('closing'); }, 190);
  }

  async function openDash(slug) {
    const frame = document.getElementById('frame');
    hideMenuView();
    document.getElementById('ptFab').style.display = '';       // mostrar botón "← Menú" al ver un dashboard
    currentSlug = slug;
    try {
      const d = await api({ action:'view', slug, token });
      if (d.kind === 'file' && d.url) {
        frame.removeAttribute('srcdoc');
        // PDF: ocultamos la barra del visor (descarga/impresión) con #toolbar=0.
        const isPdf = /pdf/i.test(d.mime || '') || /\.pdf(\?|#|$)/i.test(d.url);
        frame.src = isPdf ? d.url + '#toolbar=0&navpanes=0' : d.url;
      } else {
        frame.removeAttribute('src');
        frame.srcdoc = d.html || '<p style="font-family:sans-serif;padding:40px;text-align:center;color:#667">Dashboard vacío.</p>';
      }
    } catch (err) {
      if (String(err.message).includes('expirada')) return logout();
      frame.removeAttribute('src');
      frame.srcdoc = `<p style="font-family:sans-serif;padding:40px;text-align:center;color:#c0392b">${esc(err.message)}</p>`;
    }
  }

  function logout() {
    token = '';
    currentSlug = '';
    try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}   // limpia el #slug
    document.getElementById('app').style.display = 'none';
    document.getElementById('menuView').style.display = 'none';
    document.getElementById('ptFab').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('p').value = '';
    const frame = document.getElementById('frame');
    frame.removeAttribute('src'); frame.srcdoc = '';
  }
</script>
</body>
</html>
