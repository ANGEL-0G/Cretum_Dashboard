<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Cretum Partners · Portal</title>
<style>
  :root{--navy:#17436b;--navy2:#1f5a8f;--ink:#1a1f2e;--soft:#6b7689;--line:#e4e9f0;--bg:#eef2f7;--red:#c0392b}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(20,40,80,.14);width:100%;max-width:380px;padding:32px 28px}
  .brand{text-align:center;margin-bottom:22px}
  .brand .eye{font-size:10.5px;letter-spacing:2.5px;color:var(--soft)}
  .brand h1{font-size:20px;color:var(--navy);margin:6px 0 0;font-weight:600}
  label{display:block;font-size:12px;color:var(--soft);margin:14px 0 5px;font-weight:500}
  input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;outline:none}
  input:focus{border-color:var(--navy)}
  button{width:100%;margin-top:20px;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:500;cursor:pointer}
  button:hover{background:var(--navy2)}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:12.5px;color:var(--red);text-align:center;min-height:16px}
  /* Vista con dashboards */
  #app{display:none;height:100%;flex-direction:column}
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:12px;padding:10px 16px}
  .topbar .t{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:6px 10px;font-size:12.5px;max-width:46vw}
  .topbar select option{color:#000}
  .topbar .out{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:7px;padding:6px 12px;font-size:12px;width:auto;margin:0;cursor:pointer}
  iframe{flex:1;width:100%;border:0;background:#fff}
  .eye-foot{position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--soft)}
</style>
</head>
<body>
  <!-- Login -->
  <div class="center" id="loginView">
    <div class="card">
      <div class="brand"><div class="eye">CRETUM PARTNERS</div><h1>Portal de Inversión</h1></div>
      <form id="loginForm" onsubmit="return doLogin(event)">
        <label for="u">Usuario</label>
        <input id="u" autocomplete="username" autocapitalize="none" autocorrect="off" required>
        <label for="p">Contraseña</label>
        <input id="p" type="password" autocomplete="current-password" required>
        <button id="btn" type="submit">Entrar</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="topbar">
      <span class="t" id="who"></span>
      <select id="picker" onchange="openDash(this.value)" style="display:none"></select>
      <button class="out" onclick="logout()">Salir</button>
    </div>
    <iframe id="frame" sandbox="allow-scripts allow-popups allow-forms"></iframe>
  </div>

  <div class="eye-foot">© Cretum Partners</div>

<script>
  let token = sessionStorage.getItem('cp_tok') || '';
  let dashboards = [];

  async function api(body) {
    const r = await fetch('/api/portal', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    return d;
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn'), msg = document.getElementById('msg');
    msg.textContent = ''; btn.disabled = true; btn.textContent = 'Entrando…';
    try {
      const d = await api({ action: 'login', username: document.getElementById('u').value, password: document.getElementById('p').value });
      token = d.token; sessionStorage.setItem('cp_tok', token);
      enterApp(d.label, d.dashboards);
    } catch (err) {
      msg.textContent = err.message;
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar';
    }
    return false;
  }

  function enterApp(label, dl) {
    dashboards = dl || [];
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('who').textContent = label || 'Bienvenido';
    const picker = document.getElementById('picker');
    if (dashboards.length > 1) {
      picker.style.display = '';
      picker.innerHTML = dashboards.map(x => `<option value="${x.slug}">${x.title.replace(/</g,'&lt;')}</option>`).join('');
    } else {
      picker.style.display = 'none';
    }
    if (dashboards.length) openDash(dashboards[0].slug);
    else document.getElementById('frame').srcdoc = '<p style="font-family:sans-serif;color:#667;padding:40px;text-align:center">No tienes dashboards asignados todavía.</p>';
  }

  async function openDash(slug) {
    const dash = dashboards.find(d => d.slug === slug) || dashboards[0];
    document.getElementById('who').textContent = dash ? dash.title : '';
    try {
      const d = await api({ action: 'view', slug, token });
      document.getElementById('frame').srcdoc = d.html || '<p style="font-family:sans-serif;padding:40px;text-align:center;color:#667">Dashboard vacío.</p>';
    } catch (err) {
      if (String(err.message).includes('expirada')) return logout();
      document.getElementById('frame').srcdoc = `<p style="font-family:sans-serif;padding:40px;text-align:center;color:#c0392b">${err.message}</p>`;
    }
  }

  function logout() {
    token = ''; sessionStorage.removeItem('cp_tok');
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('p').value = '';
    document.getElementById('frame').srcdoc = '';
  }
</script>
</body>
</html>
