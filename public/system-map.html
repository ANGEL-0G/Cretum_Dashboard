<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cretum Desk · Mapa del sistema (3D)</title>
<style>
  :root{
    --bg0:#070b14; --bg1:#0b1120; --ink:#eef2fb; --dim:#a9b6d1; --faint:#6b7896;
    --navy:#3b6fd4; --navy-soft:#5d8ff5; --card:rgba(16,23,42,.82); --brd:rgba(120,150,220,.18);
    --frontend:#5d8ff5; --api:#22c8b6; --data:#f5b23e; --ext:#b98cff; --auth:#f4658c;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --display:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,Cambria,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);color:var(--ink);
    background:radial-gradient(1200px 820px at 28% 22%,#12203b,var(--bg1) 46%,var(--bg0));
    overflow:hidden}
  #app{display:flex;height:100vh}
  .main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;position:relative}
  .head{padding:18px 26px 10px;position:relative;z-index:3;pointer-events:none}
  .kick{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--navy-soft)}
  .head h1{font-family:var(--display);font-weight:600;font-size:clamp(20px,2.6vw,30px);margin:7px 0 3px;color:#fff;letter-spacing:-.01em}
  .head p{margin:0;color:var(--dim);font-size:13.5px;max-width:76ch;line-height:1.5}
  #net{flex:1 1 auto;min-height:0;position:relative}
  /* Capa de nombres (HTML sincronizado a la posición 3D de cada nodo) */
  #labels{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2}
  .n-label{position:absolute;top:0;left:0;white-space:nowrap;font-size:11.5px;font-weight:600;
    color:#dfe7fb;text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 2px rgba(0,0,0,.9);
    padding:1px 2px;letter-spacing:.1px;transition:opacity .12s;will-change:transform}
  .n-label.hot{color:#fff;font-size:13px;font-weight:700}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;
    color:var(--dim);font-size:14px;gap:10px;flex-direction:column}
  .spin{width:34px;height:34px;border:3px solid rgba(120,150,220,.25);border-top-color:var(--navy-soft);
    border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .side{flex:0 0 336px;background:var(--card);border-left:1px solid var(--brd);
    display:flex;flex-direction:column;backdrop-filter:blur(10px);z-index:3}
  .panel{padding:20px 22px 16px;border-bottom:1px solid var(--brd);min-height:190px}
  .panel .pico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;color:#0b1120;margin-bottom:12px}
  .panel h2{font-family:var(--display);font-weight:600;font-size:18px;color:#fff;margin:0 0 3px;line-height:1.2}
  .panel .grp{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--dim);margin:0 0 10px}
  .panel .sw{width:9px;height:9px;border-radius:50%;display:inline-block}
  .panel p{margin:0 0 10px;color:var(--dim);font-size:13px;line-height:1.55}
  .panel .src{font-size:11.5px;color:var(--faint);word-break:break-word}
  .panel .src b{color:var(--dim);font-weight:600}
  .panel .rel{margin:8px 0 0;padding:0;list-style:none}
  .panel .rel li{font-size:12px;color:var(--dim);padding:3px 0;display:flex;gap:7px;align-items:baseline}
  .panel .rel .arw{color:var(--navy-soft);font-weight:700;flex:0 0 auto}
  .panel .empty{color:var(--faint);font-size:13px;line-height:1.55}

  .bar{display:flex;gap:8px;padding:12px 16px 6px}
  .btn{flex:1;background:rgba(93,143,245,.14);border:1px solid var(--brd);color:var(--navy-soft);
    font-size:12px;border-radius:9px;padding:8px 10px;cursor:pointer;font-family:var(--font);font-weight:600;transition:background .15s}
  .btn:hover{background:rgba(93,143,245,.26)}
  .btn.ghost{background:transparent;color:var(--dim)}

  .legwrap{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .leg{overflow-y:auto;padding:2px 12px 16px;flex:1 1 auto}
  .lhdr{padding:13px 10px 6px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    display:flex;align-items:center;gap:8px}
  .lhdr .ldot{width:9px;height:9px;border-radius:50%}
  .lrow{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:9px;cursor:pointer;transition:background .15s}
  .lrow:hover{background:rgba(255,255,255,.06)}
  .lrow.on{background:rgba(93,143,245,.18)}
  .lrow .d{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .lrow .nm{font-size:12.5px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (max-width:900px){
    #app{flex-direction:column}
    .side{flex:none;width:100%;height:44vh;border-left:0;border-top:1px solid var(--brd)}
    .main{height:56vh}
    .head p{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <div class="main">
    <div class="head">
      <div class="kick">Cretum Desk</div>
      <h1>El sistema completo, en 3D</h1>
      <p>Cada esfera es una parte de la plataforma; las líneas son cómo se conectan. Gira, acércate y da clic en cualquier parte para ver qué hace y dónde vive. Colores por capa: <b style="color:var(--frontend)">interfaz</b>, <b style="color:var(--api)">APIs</b>, <b style="color:var(--data)">datos</b>, <b style="color:var(--ext)">servicios</b>, <b style="color:var(--auth)">seguridad</b>.</p>
    </div>
    <div id="net">
      <div id="labels"></div>
      <div id="loading"><div class="spin"></div><div>Cargando el mapa…</div></div>
    </div>
  </div>
  <aside class="side">
    <div class="panel" id="panel"></div>
    <div class="bar">
      <button class="btn" onclick="fitAll()">Ver todo</button>
      <button class="btn ghost" id="spinBtn" onclick="toggleSpin()">Girar</button>
    </div>
    <div class="legwrap"><div class="leg" id="leg"></div></div>
  </aside>
</div>

<script src="/vendor/3d-force-graph.min.js"></script>
<script>
/* ────────────────────────────────────────────────────────────────────────
   MAPA DEL SISTEMA — Cretum Desk
   Grafo de arquitectura curado: módulos de la interfaz, APIs serverless,
   almacenes de datos, servicios externos y la capa de seguridad, con las
   relaciones reales entre ellos. Altitud "cómo funciona el sistema" (no el
   grafo de 760 símbolos de código, que vive en graphify-out/graph.html).
──────────────────────────────────────────────────────────────────────── */

const GROUPS = {
  frontend: { name: 'Interfaz (Frontend)', color: '#5d8ff5' },
  api:      { name: 'APIs (serverless)',   color: '#22c8b6' },

};

const NODES = [
  // ── Interfaz (public/index.html + public/app.js) ──
  { id:'fe_todo',    name:'To Do',                 group:'frontend', val:9,  desc:'Tareas personales y de equipo: vistas Lista, Kanban y Timeline; asignaciones con aceptar/declinar; estatus, notas y progreso.', src:'public/app.js · public/index.html' },
  { id:'fe_bd',      name:'Base de Datos',         group:'frontend', val:9,  desc:'Inversionistas y portafolio (LP tracking): posiciones, series, empresas. Exporta a Excel/PDF/HTML por inversionista.', src:'public/app.js' },
  { id:'fe_camp',    name:'Campañas (Yesware)',    group:'frontend', val:7,  desc:'Engagement por LP y por mes desde CSV de Yesware. Ranking visible a todos; detalle solo admin.', src:'public/app.js' },
  { id:'fe_portal_admin', name:'Portal (admin)',   group:'frontend', val:6,  desc:'Gestión de dashboards y usuarios del portal de clientes: crear dashboard, crear usuario, consultar datos.', src:'public/app.js' },
  { id:'fe_dropbox', name:'Dropbox',               group:'frontend', val:6,  desc:'Explorador de archivos del equipo desde Dropbox: previsualizar, descargar a la PC y copiar enlace.', src:'public/app.js' },
  { id:'fe_notas',   name:'Notas',                 group:'frontend', val:6,  desc:'Notas personales con carpetas y colores; compartir con el equipo. Privadas por usuario (RLS).', src:'public/app.js' },
  { id:'fe_fund',    name:'Fund Trackers',         group:'frontend', val:5,  desc:'Valuation Overview de los fondos MVP (Fund IV/V) con posiciones y métricas.', src:'public/app.js' },
  { id:'fe_fr',      name:'Fund Rising Tracker',   group:'frontend', val:5,  desc:'Pipeline de levantamiento de capital por oportunidad: prospectos, etapas y seguimiento.', src:'public/app.js' },
  { id:'fe_sistema', name:'Sistema (este mapa)',   group:'frontend', val:4,  desc:'Este mapa 3D del sistema. Da una idea de cómo funciona la plataforma y cómo se relaciona cada parte.', src:'public/system-map.html' },
  { id:'portal_cli', name:'Portal de clientes',    group:'frontend', val:6,  desc:'Frontends externos para clientes (portal.html / portal-mvp.html): dashboards HTML por organización, con login propio aislado de Supabase.', src:'public/portal.html · public/portal-mvp.html' },

  { id:'api_portal',  name:'/api/portal',            group:'api', val:7, desc:'Portal de clientes: login propio (scrypt + token HMAC) y gestión admin. Service-role a Supabase.', src:'api/portal.js' },

  { id:'api_sheets',  name:'/api/sheets',            group:'api', val:6, desc:'Puente con Google Apps Script para sincronizar las campañas de Yesware (solo admin).', src:'api/sheets.js' },
  { id:'api_reminder',name:'/api/reminder',          group:'api', val:6, desc:'Resumen semanal por email. Modo cron (a todos) o modo usuario ("enviar ahora").', src:'api/reminder.js' },
  { id:'api_notify',  name:'/api/notify-assignment', group:'api', val:5, desc:'Emails transaccionales al asignar / aceptar / declinar tareas.', src:'api/notify-assignment.js' },
  { id:'api_notes',   name:'/api/notes-share',       group:'api', val:5, desc:'Compartir una nota personal con miembros del equipo (copia + email). Service-role.', src:'api/notes-share.js' },
  { id:'api_contacts',name:'/api/contacts',          group:'api', val:4, desc:'Contactos (LP tracking / apertura de mercados).', src:'api/contacts.js' },
  { id:'api_forms',   name:'/api/forms',             group:'api', val:4, desc:'Formularios públicos y su recepción.', src:'api/forms.js' },
  { id:'api_prices',  name:'/api/prices',            group:'api', val:3, desc:'Precios de referencia para valuaciones.', src:'api/prices.js' },
  { id:'api_logo',    name:'/api/logo',              group:'api', val:3, desc:'Sirve el logo para correos y assets.', src:'api/logo.js' },

  // ── Datos / almacenes ──
  { id:'db_supabase', name:'Supabase (Postgres)', group:'data', val:10, desc:'Base de datos principal: perfiles+roles, portafolio, campañas, portal, notas. Todo con RLS. Fuente de casi todos los datos.', src:'db/*.sql (migraciones)' },
  { id:'db_redis',    name:'Redis (Upstash)',     group:'data', val:6,  desc:'Caché de tareas (blob "tasks") y del access token de Dropbox (~4 h).', src:'api/_lib/redis.js' },

  // ── Servicios externos ──
  { id:'ext_dropbox', name:'Dropbox (cuenta admin)', group:'ext', val:5, desc:'Almacenamiento de archivos del equipo. Una sola cuenta autoriza la app (refresh token).', src:'API de Dropbox' },
  { id:'ext_sheets',  name:'Google Sheets',          group:'ext', val:5, desc:'Hoja puente para las campañas de Yesware, vía Google Apps Script.', src:'Apps Script' },
  { id:'ext_resend',  name:'Resend (email)',         group:'ext', val:5, desc:'Envío de correos transaccionales (remitente notificaciones@cretumdesk.com).', src:'api/_lib/email.js' },
  { id:'ext_cron',    name:'Vercel Cron',            group:'ext', val:4, desc:'Disparador programado: recordatorio diario 8 AM CDMX que llama a /api/reminder.', src:'vercel.json' },

  // ── Seguridad / Auth ──
  { id:'auth_jwt',    name:'Auth JWT (Supabase)', group:'auth', val:7, desc:'authenticate() valida el JWT de Supabase en cada API. El frontend llama con Authorization: Bearer.', src:'api/_lib/auth.js' },
  { id:'auth_rls',    name:'RLS (Row Level Security)', group:'auth', val:6, desc:'Reglas por fila en Postgres: cada quien ve/edita lo suyo; tablas sensibles solo-admin vía funciones SECURITY DEFINER.', src:'db/*.sql' },
  { id:'auth_2fa',    name:'2FA (TOTP)',          group:'auth', val:4, desc:'Segundo factor opcional vía Supabase MFA (TOTP).', src:'Supabase Auth' },
  { id:'auth_portal', name:'Auth Portal (HMAC)',  group:'auth', val:5, desc:'Login propio de clientes, aislado de Supabase: contraseña con scrypt (salt$hash) y token HMAC (PORTAL_JWT_SECRET).', src:'api/portal.js' },
];

const LINKS = [
  // Frontend → bootstrap + auth
  { source:'fe_todo', target:'api_config', label:'bootstrap' },
  { source:'fe_bd', target:'api_config', label:'bootstrap' },
  { source:'fe_todo', target:'auth_jwt', label:'inicia sesión' },
  { source:'fe_bd', target:'auth_jwt', label:'inicia sesión' },

  // Frontend → APIs
  { source:'fe_todo', target:'api_tasks', label:'carga / guarda' },
  { source:'fe_todo', target:'api_notify', label:'asigna tareas' },
  { source:'fe_todo', target:'api_reminder', label:'enviar ahora' },
  { source:'fe_dropbox', target:'api_dropbox', label:'explora / descarga' },
  { source:'fe_camp', target:'api_sheets', label:'sync Yesware' },
  { source:'fe_portal_admin', target:'api_portal', label:'gestiona' },
  { source:'fe_notas', target:'api_notes', label:'compartir' },
  { source:'fe_bd', target:'api_contacts', label:'contactos' },
  { source:'fe_fr', target:'api_contacts', label:'prospectos' },

  // Frontend → Supabase directo (cliente sb con RLS)
  { source:'fe_bd', target:'db_supabase', label:'sb (RLS)' },
  { source:'fe_camp', target:'db_supabase', label:'ranking' },
  { source:'fe_notas', target:'db_supabase', label:'notas (RLS)' },
  { source:'fe_fund', target:'db_supabase', label:'fondos' },
  { source:'fe_portal_admin', target:'db_supabase', label:'lee' },

  // APIs → almacenes / servicios
  { source:'api_tasks', target:'db_redis', label:'blob tasks' },
  { source:'api_tasks', target:'auth_jwt', label:'valida' },
  { source:'api_portal', target:'db_supabase', label:'service-role' },
  { source:'api_portal', target:'auth_portal', label:'token HMAC' },
  { source:'api_dropbox', target:'ext_dropbox', label:'OAuth refresh' },
  { source:'api_dropbox', target:'db_redis', label:'cachea token' },
  { source:'api_dropbox', target:'auth_jwt', label:'valida' },
  { source:'api_sheets', target:'ext_sheets', label:'Apps Script' },
  { source:'api_sheets', target:'db_supabase', label:'engagement' },
  { source:'api_reminder', target:'ext_resend', label:'email' },
  { source:'api_reminder', target:'db_supabase', label:'preferencias' },
  { source:'api_reminder', target:'db_redis', label:'tareas' },
  { source:'api_notify', target:'ext_resend', label:'email' },
  { source:'api_notes', target:'db_supabase', label:'service-role' },
  { source:'api_notes', target:'ext_resend', label:'email' },
  { source:'api_contacts', target:'db_supabase', label:'consulta' },
  { source:'api_forms', target:'db_supabase', label:'guarda' },
  { source:'api_config', target:'db_supabase', label:'URL + anon' },
  { source:'api_prices', target:'db_supabase', label:'precios' },

  // Seguridad
  { source:'auth_jwt', target:'db_supabase', label:'verifica' },
  { source:'db_supabase', target:'auth_rls', label:'aplica' },
  { source:'auth_2fa', target:'auth_jwt', label:'2º factor' },

  // Portal de clientes (externo)
  { source:'portal_cli', target:'api_portal', label:'login / datos' },
  { source:'portal_cli', target:'auth_portal', label:'sesión HMAC' },

  // Cron
  { source:'ext_cron', target:'api_reminder', label:'cron 8 AM' },
];

const NODE_BY_ID = Object.fromEntries(NODES.map(n => [n.id, n]));
const gcolor = id => GROUPS[NODE_BY_ID[id]?.group]?.color || '#8aa';

let Graph, selected = null, spinning = false, spinTimer = null;

function neighborsOf(id){
  const out = [], inc = [];
  LINKS.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === id) out.push({ id:t, label:l.label });
    if (t === id) inc.push({ id:s, label:l.label });
  });
  return { out, inc };
}

function boot(){
  const el = document.getElementById('net');
  Graph = ForceGraph3D({ controlType:'orbit' })(el)
    .backgroundColor('rgba(0,0,0,0)')
    .graphData({ nodes: NODES.map(n => ({ ...n })), links: LINKS.map(l => ({ ...l })) })
    .nodeId('id')
    .nodeVal('val')
    .nodeColor(n => gcolor(n.id))
    .nodeOpacity(0.95)
    .nodeResolution(16)
    .nodeRelSize(4.5)
    .linkColor(() => 'rgba(150,175,225,0.28)')
    .linkWidth(0.5)
    .linkDirectionalParticles(2)
    .linkDirectionalParticleWidth(1.6)
    .linkDirectionalParticleSpeed(0.006)
    .linkDirectionalParticleColor(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      return gcolor(s);
    })
    .linkLabel(l => l.label ? `<span style="font:12px sans-serif;color:#fff;background:rgba(10,15,28,.9);padding:3px 7px;border-radius:6px">${l.label}</span>` : '')
    .onNodeClick(n => { select(n.id); focusNode(n); })
    .onNodeHover(n => { document.body.style.cursor = n ? 'pointer' : 'default'; })
    .onBackgroundClick(() => select(null))
    .warmupTicks(60)
    .cooldownTicks(200);

  // Fuerzas: más separación para que se lea
  Graph.d3Force('charge').strength(-160);
  Graph.d3Force('link').distance(70);

  document.getElementById('loading').style.display = 'none';
  renderLegend();
  renderPanel(null);
  buildLabels();
  requestAnimationFrame(syncLabels);
  setTimeout(fitAll, 600);

  const resize = () => Graph.width(el.clientWidth).height(el.clientHeight);
  window.addEventListener('resize', resize);
  resize();
}

/* ── Nombres siempre visibles: capa HTML sincronizada a la proyección 3D ── */
let labelEls = {};
function buildLabels(){
  const layer = document.getElementById('labels');
  layer.innerHTML = '';
  labelEls = {};
  NODES.forEach(n => {
    const d = document.createElement('div');
    d.className = 'n-label';
    d.textContent = n.name;
    layer.appendChild(d);
    labelEls[n.id] = d;
  });
}
function syncLabels(){
  if (Graph){
    const cam = Graph.camera();
    const ctr = (Graph.controls() && Graph.controls().target) || { x:0, y:0, z:0 };
    // Dirección de la cámara (para ocultar nombres que quedan detrás)
    const fx = ctr.x - cam.position.x, fy = ctr.y - cam.position.y, fz = ctr.z - cam.position.z;
    const net = document.getElementById('net');
    const w = net.clientWidth, h = net.clientHeight;
    const nodes = Graph.graphData().nodes;
    const nb = selected ? neighborsOf(selected) : null;
    for (const n of nodes){
      const el = labelEls[n.id];
      if (!el || n.x == null) continue;
      const inFront = (n.x - cam.position.x) * fx + (n.y - cam.position.y) * fy + (n.z - cam.position.z) * fz > 0;
      const c = Graph.graph2ScreenCoords(n.x, n.y, n.z);
      const onScreen = inFront && c.x >= -40 && c.x <= w + 40 && c.y >= -20 && c.y <= h + 20;
      if (!onScreen){ el.style.opacity = '0'; continue; }
      const dx = n.x - cam.position.x, dy = n.y - cam.position.y, dz = n.z - cam.position.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const near = 120, far = 900;
      let op = 1 - (dist - near) / (far - near);
      op = Math.max(0.18, Math.min(1, op));
      if (nb){
        const related = selected === n.id || nb.out.some(x => x.id === n.id) || nb.inc.some(x => x.id === n.id);
        if (!related) op *= 0.22;
      }
      el.style.opacity = String(op);
      el.style.transform = `translate(-50%,-50%) translate(${c.x}px, ${c.y - 14}px)`;
    }
  }
  requestAnimationFrame(syncLabels);
}

/* ── Panel de detalle ── */
function renderPanel(id){
  const p = document.getElementById('panel');
  if (!id){
    p.innerHTML = `<div class="pico" style="background:var(--navy);color:#fff">✦</div>
      <h2>Explora el sistema</h2>
      <p class="empty">Da clic en una esfera del grafo (o en un nombre de la lista) para ver qué hace, dónde vive en el código y con qué se conecta.</p>`;
    return;
  }
  const n = NODE_BY_ID[id];
  const g = GROUPS[n.group];
  const { out, inc } = neighborsOf(id);
  const relHtml = [
    ...out.map(x => `<li><span class="arw">→</span><span><b style="color:${gcolor(x.id)}">${NODE_BY_ID[x.id].name}</b> · ${x.label}</span></li>`),
    ...inc.map(x => `<li><span class="arw" style="color:var(--faint)">←</span><span><b style="color:${gcolor(x.id)}">${NODE_BY_ID[x.id].name}</b> · ${x.label}</span></li>`),
  ].join('');
  p.innerHTML = `
    <div class="pico" style="background:${g.color}">${n.name.slice(0,1).toUpperCase()}</div>
    <h2>${n.name}</h2>
    <div class="grp"><span class="sw" style="background:${g.color}"></span>${g.name}</div>
    <p>${n.desc}</p>
    <div class="src"><b>Vive en:</b> ${n.src}</div>
    ${relHtml ? `<ul class="rel">${relHtml}</ul>` : ''}`;
}

/* ── Leyenda por capa ── */
function renderLegend(){
  const leg = document.getElementById('leg');
  let html = '';
  for (const [gid, g] of Object.entries(GROUPS)){
    const items = NODES.filter(n => n.group === gid);
    html += `<div class="lhdr"><span class="ldot" style="background:${g.color}"></span>${g.name}</div>`;
    html += items.map(n =>
      `<div class="lrow" id="row-${n.id}" onclick="pickFromLegend('${n.id}')">
        <span class="d" style="background:${g.color}"></span>
        <span class="nm">${n.name}</span>
      </div>`).join('');
  }
  leg.innerHTML = html;
}

function pickFromLegend(id){
  select(id);
  const n = Graph.graphData().nodes.find(x => x.id === id);
  if (n) focusNode(n);
}

function select(id){
  selected = id;
  renderPanel(id);
  document.querySelectorAll('.lrow').forEach(r => r.classList.remove('on'));
  Object.values(labelEls).forEach(e => e.classList.remove('hot'));
  if (id){
    document.getElementById('row-' + id)?.classList.add('on');
    labelEls[id]?.classList.add('hot');
  }
  // Resaltar aristas conectadas
  Graph.linkColor(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (!id) return 'rgba(150,175,225,0.28)';
    return (s === id || t === id) ? gcolor(s) : 'rgba(150,175,225,0.07)';
  }).linkWidth(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return (id && (s === id || t === id)) ? 1.8 : 0.5;
  });
}

function focusNode(n){
  const dist = 130;
  const r = Math.hypot(n.x, n.y, n.z) || 1;
  const ratio = 1 + dist / r;
  Graph.cameraPosition(
    { x: n.x * ratio, y: n.y * ratio, z: n.z * ratio },
    n, 900
  );
}

function fitAll(){
  select(null);
  Graph.zoomToFit(700, 70);
}

function toggleSpin(){
  spinning = !spinning;
  document.getElementById('spinBtn').textContent = spinning ? 'Detener' : 'Girar';
  if (spinning){
    let angle = Math.atan2(Graph.cameraPosition().x || 0, Graph.cameraPosition().z || 1);
    const dist = 640;
    spinTimer = setInterval(() => {
      angle += Math.PI / 320;
      Graph.cameraPosition({ x: dist * Math.sin(angle), z: dist * Math.cos(angle) });
    }, 30);
  } else {
    clearInterval(spinTimer);
  }
}

if (window.ForceGraph3D) boot();
else document.getElementById('loading').innerHTML = 'No se pudo cargar la librería 3D.';
</script>
