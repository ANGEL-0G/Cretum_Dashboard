<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>MVP · Portal</title>
<style>
  :root{--navy:#c9651f;--navy-mid:#ED7824;--ink:#1a1f2e;--soft:#6b7689;--line:#efe4d9;--red:#c0392b;--red-bg:#fbe6e3;
        --gray-200:#ece3d8;--gray-300:#d4c6b4;--gray-400:#a89a86;--font:-apple-system,'Segoe UI',Arial,sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);color:var(--ink)}

  /* ───────── LOGIN ───────── */
  #loginView{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:#fffdfb;position:relative;overflow:hidden;
  }
  /* textura de puntos cálidos muy sutil, difuminada hacia los bordes */
  #loginView::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(237,120,36,.10) 1px, transparent 1px);
    background-size:30px 30px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
    mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  /* orbes naranjas/ámbar desenfocados flotando */
  .blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
  .blob1{width:460px;height:460px;top:-120px;left:-110px;background:radial-gradient(circle,rgba(237,120,36,.30),transparent 70%);animation:float1 16s ease-in-out infinite}
  .blob2{width:380px;height:380px;bottom:-120px;right:-90px;background:radial-gradient(circle,rgba(245,180,80,.30),transparent 70%);animation:float2 19s ease-in-out infinite}
  .blob3{width:320px;height:320px;top:54%;left:46%;background:radial-gradient(circle,rgba(248,149,64,.24),transparent 70%);animation:float3 14s ease-in-out infinite}
  .dot{position:absolute;border-radius:50%;filter:blur(20px);pointer-events:none}
  .dot1{width:100px;height:100px;top:16%;right:16%;background:radial-gradient(circle,rgba(237,120,36,.34),transparent 70%);animation:float2 13s ease-in-out infinite}
  .dot2{width:64px;height:64px;bottom:20%;left:14%;background:radial-gradient(circle,rgba(245,180,80,.34),transparent 70%);animation:float1 11s ease-in-out infinite}
  .dot3{width:130px;height:130px;top:28%;left:7%;background:radial-gradient(circle,rgba(248,149,64,.26),transparent 70%);animation:float3 18s ease-in-out infinite}
  .dot4{width:80px;height:80px;bottom:12%;right:24%;background:radial-gradient(circle,rgba(237,120,36,.30),transparent 70%);animation:float1 15s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,46px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-54px,-36px)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,28px) scale(1.18)}}

  .card{
    position:relative;z-index:2;width:380px;max-width:100%;
    background:rgba(255,255,255,.80);
    -webkit-backdrop-filter:blur(16px) saturate(160%);backdrop-filter:blur(16px) saturate(160%);
    border-radius:20px;padding:38px 36px 28px;
    box-shadow:0 24px 60px rgba(160,80,20,.16),0 6px 18px rgba(160,80,20,.08),0 0 0 1px rgba(200,100,30,.06);
    animation:slideUp .5s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;top:0;left:30px;right:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(237,120,36,.45),transparent)}
  .logo{width:200px;max-width:100%;display:block;margin:2px auto 8px;filter:drop-shadow(0 4px 12px rgba(237,120,36,.16));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
  .card:hover .logo{transform:scale(1.04)}
  .sub{font-size:12.5px;color:var(--gray-400);text-align:center;letter-spacing:1.5px;margin-bottom:26px;text-transform:uppercase}
  .field{position:relative;margin-bottom:12px}
  .fi{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;font-family:var(--font)}
  .fi:hover{border-color:var(--gray-300)}
  .fi:focus{border-color:var(--navy-mid);box-shadow:0 0 0 3px rgba(237,120,36,.12)}
  .fi::placeholder{color:var(--gray-300)}
  .btn{
    position:relative;overflow:hidden;width:100%;padding:13px 16px;margin-top:8px;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border:none;border-radius:10px;color:#fff;
    font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 8px 20px rgba(237,120,36,.40),inset 0 1px 0 rgba(255,255,255,.18);
    transition:all .22s cubic-bezier(.4,0,.2,1);
  }
  .btn::before{content:'';position:absolute;top:0;left:-120%;width:80%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32) 50%,transparent);transform:skewX(-25deg);transition:left .7s cubic-bezier(.4,0,.2,1)}
  .btn:hover::before{left:120%}
  .btn>span,.btn>i{position:relative;z-index:1}
  .btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(237,120,36,.5),inset 0 1px 0 rgba(255,255,255,.22)}
  .btn:active{transform:translateY(0) scale(.98)}
  .btn:disabled{opacity:.65;cursor:default}
  .msg{font-size:12px;color:var(--red);background:var(--red-bg);border-radius:10px;padding:10px 13px;margin-top:14px;display:none;align-items:center;gap:7px}
  .msg.show{display:flex}
  .foot{text-align:center;font-size:10.5px;color:var(--gray-300);margin-top:22px;letter-spacing:.3px}

  /* ───────── DASHBOARD ───────── */
  #app{display:none;height:100%}
  #frame{width:100%;height:100%;border:0;background:#fff;display:block}
  /* Control flotante compacto: un botón chico (⋯) que despliega opciones — ocupa
     mínimo espacio para no tapar el contenido del dashboard. */
  .pt-fab{position:fixed;top:calc(14px + env(safe-area-inset-top,0px));left:14px;z-index:12}
  /* Pastilla glass: translúcida + desenfoque → deja ver el contenido detrás */
  .pt-fab-btn{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    padding:9px 15px;border-radius:999px;
    background:rgba(255,255,255,.5);color:var(--navy);
    border:1px solid rgba(255,255,255,.55);
    font-family:var(--font);font-size:13.5px;font-weight:600;line-height:1;
    -webkit-backdrop-filter:blur(16px) saturate(180%);backdrop-filter:blur(16px) saturate(180%);
    box-shadow:0 4px 18px rgba(80,50,20,.18);
    transition:background .18s,color .18s,transform .12s,box-shadow .18s,border-color .18s;
  }
  .pt-fab-btn:hover{background:rgba(255,255,255,.66)}
  .pt-fab-btn:active{transform:scale(.97)}
  /* Al abrir se ilumina con el color de marca (naranja en MVP) */
  .pt-fab-btn[aria-expanded="true"]{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 8px 24px rgba(237,120,36,.45)}
  .pt-fab-btn span{pointer-events:none}
  .pt-fab-ic{font-size:14px}
  .pt-fab-ch{font-size:11px;opacity:.75;transition:transform .2s cubic-bezier(.2,.7,.3,1)}
  .pt-fab-btn[aria-expanded="true"] .pt-fab-ch{transform:rotate(180deg)}
  .pt-fab-menu{
    position:absolute;top:48px;left:0;min-width:248px;max-width:min(300px,86vw);max-height:min(70vh,440px);overflow-y:auto;
    background:rgba(255,255,255,.98);border:1px solid rgba(150,120,90,.2);border-radius:14px;
    box-shadow:0 14px 40px rgba(80,50,20,.22);padding:6px;
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;transform-origin:top left;
    transition:opacity .16s ease,transform .16s cubic-bezier(.2,.7,.3,1);
  }
  .pt-fab-menu.open{opacity:1;transform:none;pointer-events:auto}
  .pt-fab-item{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:none;border:0;border-radius:9px;padding:10px 12px;
    font-family:var(--font);font-size:13.5px;color:var(--ink);cursor:pointer;
    transition:background .13s ease,transform .1s ease;
  }
  .pt-fab-item:hover{background:rgba(0,0,0,.05)}
  .pt-fab-item:active{transform:scale(.98)}
  .pt-fab-item .pt-fab-i{font-size:15px;width:18px;text-align:center;color:var(--navy)}
  /* Switcher de dashboards dentro del menú */
  .pt-fab-hd{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);padding:8px 12px 5px}
  .pt-fab-dot{flex:0 0 7px;width:7px;height:7px;border-radius:50%;background:var(--gray-300,#d4c6b4)}
  .pt-fab-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pt-fab-cur{color:var(--navy);font-size:12px;flex-shrink:0}
  .pt-fab-dash.active{background:rgba(237,120,36,.12);color:var(--navy);font-weight:600}
  .pt-fab-dash.active .pt-fab-dot{background:var(--navy)}
  .pt-fab-sep{height:1px;background:rgba(0,0,0,.08);margin:6px 6px}
  .pt-fab-logout .pt-fab-i{color:var(--red)}
  @media (prefers-reduced-motion:reduce){.pt-fab-btn,.pt-fab-menu{transition:none}}

  /* Menú de dashboards: respaldo cuando hay varios y no se entró por enlace directo */
  .menu-view{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:24px;background:#fffdfb;overflow:auto}
  .menu-card{width:460px;max-width:100%;text-align:center}
  .menu-logo{width:180px;max-width:70%;display:block;margin:0 auto 22px;filter:drop-shadow(0 4px 12px rgba(237,120,36,.16))}
  .menu-title{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:20px}
  .menu-list{display:flex;flex-direction:column;gap:10px}
  .menu-item{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    background:rgba(255,255,255,.92);border:1.5px solid var(--line);border-radius:12px;
    padding:15px 17px;font-size:15px;font-weight:500;color:var(--ink);font-family:var(--font);cursor:pointer;
    box-shadow:0 2px 8px rgba(160,80,20,.06);
    transition:border-color .2s cubic-bezier(.2,.6,.3,1),transform .2s cubic-bezier(.2,.6,.3,1),box-shadow .2s;
  }
  .menu-item:hover{border-color:var(--navy-mid);transform:translateY(-2px);box-shadow:0 10px 26px rgba(237,120,36,.14)}
  .menu-item .mi-ico{width:38px;height:38px;flex:0 0 38px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;font-size:15px}
  .menu-item .mi-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .menu-item .mi-arrow{color:var(--gray-300);font-size:19px;transition:transform .2s cubic-bezier(.2,.6,.3,1),color .2s}
  .menu-item:hover .mi-arrow{color:var(--navy-mid);transform:translateX(3px)}
  @media (prefers-reduced-motion:reduce){.menu-item,.menu-item .mi-arrow{transition:none}}
</style>
</head>
<body>
  <!-- Login -->
  <div id="loginView">
    <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
    <div class="dot dot1"></div><div class="dot dot2"></div><div class="dot dot3"></div><div class="dot dot4"></div>
    <div class="card">
      <img src="/logo-mvp.png" alt="MVP" class="logo">
      <div class="sub">Portal de Inversión</div>
      <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="field">
          <input id="u" class="fi" placeholder="Usuario" autocomplete="username" autocapitalize="none" autocorrect="off" required></div>
        <div class="field">
          <input id="p" class="fi" type="password" placeholder="Contraseña" autocomplete="current-password" required></div>
        <button id="btn" class="btn" type="submit"><span>Entrar</span></button>
        <div class="msg" id="msg"></div>
      </form>
      <div class="foot">© MVP · Cretum Partners</div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="pt-fab" id="ptFab">
      <button class="pt-fab-btn" id="ptFabBtn" onclick="toggleFabMenu(event)" aria-label="Mis dashboards" aria-haspopup="true" aria-expanded="false" title="Mis dashboards">
        <span class="pt-fab-ic" aria-hidden="true">▦</span>
        <span class="pt-fab-lbl">Mis Dashboards</span>
        <span class="pt-fab-ch" aria-hidden="true">▾</span>
      </button>
      <div class="pt-fab-menu" id="ptFabMenu" role="menu"></div>
    </div>
    <!-- Menú de respaldo: solo si el cliente tiene varios dashboards y entra sin enlace directo -->
    <div id="menuView" class="menu-view" style="display:none">
      <div class="menu-card">
        <img src="/logo-mvp.png" alt="MVP" class="menu-logo">
        <div class="menu-title">Tus dashboards</div>
        <div class="menu-list" id="menuList"></div>
      </div>
    </div>
    <iframe id="frame" sandbox="allow-scripts allow-popups allow-forms"></iframe>
  </div>

<script>
  const ORG = 'mvp';
  let token = '';
  let dashboards = [];

  // Disuasivo de descarga: sin menú contextual (Guardar como / Guardar imagen).
  document.addEventListener('contextmenu', e => e.preventDefault());

  async function api(body) {
    const r = await fetch('/api/portal', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ org: ORG, ...body }) });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    return d;
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn'), msg = document.getElementById('msg');
    msg.className = 'msg'; btn.disabled = true; btn.querySelector('span').textContent = 'Entrando…';
    try {
      const d = await api({ action:'login', username:document.getElementById('u').value, password:document.getElementById('p').value });
      token = d.token;
      enterApp(d.dashboards);
    } catch (err) {
      msg.innerHTML = '⚠ ' + err.message; msg.className = 'msg show';
    } finally {
      btn.disabled = false; btn.querySelector('span').textContent = 'Entrar';
    }
    return false;
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function enterApp(dl) {
    dashboards = dl || [];
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    // Enlace directo: /portal-mvp#slug abre esa campaña sin pasar por el menú
    const slug = decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
    const target = slug && dashboards.find(d => d.slug === slug);
    if (target) return openDash(target.slug);
    if (dashboards.length === 1) return openDash(dashboards[0].slug);
    if (!dashboards.length) return showEmpty();
    showMenu();                                  // varios y sin enlace directo → menú
  }

  function showEmpty() {
    document.getElementById('menuView').style.display = 'none';
    const frame = document.getElementById('frame');
    frame.removeAttribute('src');
    frame.srcdoc = '<p style="font-family:sans-serif;color:#667;padding:40px;text-align:center">No tienes dashboards asignados todavía.</p>';
  }

  function showMenu() {
    const list = document.getElementById('menuList');
    list.innerHTML = dashboards.map(d =>
      `<button class="menu-item" data-slug="${esc(d.slug)}">
         <span class="mi-ico" aria-hidden="true">▦</span>
         <span class="mi-nm">${esc(d.title)}</span>
         <span class="mi-arrow" aria-hidden="true">›</span>
       </button>`).join('');
    list.querySelectorAll('.menu-item').forEach(b => b.onclick = () => openDash(b.dataset.slug));
    document.getElementById('menuView').style.display = 'flex';
  }

  async function openDash(slug) {
    const frame = document.getElementById('frame');
    document.getElementById('menuView').style.display = 'none';
    try { if (location.hash.replace(/^#/, '') !== slug) location.hash = slug; } catch (e) {}
    try {
      const d = await api({ action:'view', slug, token });
      if (d.kind === 'file' && d.url) {
        frame.removeAttribute('srcdoc');
        // PDF: ocultamos la barra del visor (descarga/impresión) con #toolbar=0.
        const isPdf = /pdf/i.test(d.mime || '') || /\.pdf(\?|#|$)/i.test(d.url);
        frame.src = isPdf ? d.url + '#toolbar=0&navpanes=0' : d.url;
      } else {
        frame.removeAttribute('src');
        frame.srcdoc = d.html || '<p style="font-family:sans-serif;padding:40px;text-align:center;color:#667">Dashboard vacío.</p>';
      }
    } catch (err) {
      if (String(err.message).includes('expirada')) return logout();
      frame.removeAttribute('src');
      frame.srcdoc = `<p style="font-family:sans-serif;padding:40px;text-align:center;color:#c0392b">${esc(err.message)}</p>`;
    }
  }

  function logout() {
    token = '';
    closeFabMenu();
    document.getElementById('app').style.display = 'none';
    document.getElementById('menuView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('p').value = '';
    const frame = document.getElementById('frame');
    frame.removeAttribute('src'); frame.srcdoc = '';
  }

  // ── Menú flotante (⋯): switcher de dashboards + cerrar sesión ──
  function buildFabMenu() {
    const menu = document.getElementById('ptFabMenu');
    const inMenu = document.getElementById('menuView').style.display !== 'none';
    const cur = decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
    let html = '';
    if (dashboards.length > 1) {
      html += '<div class="pt-fab-hd">Mis dashboards</div>';
      html += dashboards.map(d => {
        const active = !inMenu && d.slug === cur;
        return `<button class="pt-fab-item pt-fab-dash${active ? ' active' : ''}" data-slug="${esc(d.slug)}" role="menuitem">
          <span class="pt-fab-dot" aria-hidden="true"></span>
          <span class="pt-fab-nm">${esc(d.title)}</span>
          ${active ? '<span class="pt-fab-cur" aria-hidden="true">✓</span>' : ''}
        </button>`;
      }).join('');
      html += '<div class="pt-fab-sep"></div>';
    }
    html += '<button class="pt-fab-item pt-fab-logout" role="menuitem" onclick="logout()"><span class="pt-fab-i" aria-hidden="true">⎋</span> Cerrar sesión</button>';
    menu.innerHTML = html;
    menu.querySelectorAll('.pt-fab-dash').forEach(b => b.onclick = () => { openDash(b.dataset.slug); closeFabMenu(); });
  }
  function toggleFabMenu(e) {
    if (e) e.stopPropagation();
    const menu = document.getElementById('ptFabMenu');
    const open = !menu.classList.contains('open');
    if (open) buildFabMenu();
    menu.classList.toggle('open', open);
    document.getElementById('ptFabBtn').setAttribute('aria-expanded', open ? 'true' : 'false');
  }
  function closeFabMenu() {
    const menu = document.getElementById('ptFabMenu');
    if (menu) menu.classList.remove('open');
    const btn = document.getElementById('ptFabBtn');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  }
  document.addEventListener('click', (e) => {
    const fab = document.getElementById('ptFab');
    if (fab && !fab.contains(e.target)) closeFabMenu();
  });
</script>
</body>
</html>
